name: Release

on:
  push:
    tags:
      - 'v*'
      - '*-*'   # date-SHA format e.g. 20250228-abc1234

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: gmc_recovered-windows-x64.exe
            artifact_path: build/gmc_recovered.exe
          - os: ubuntu-22.04
            artifact_name: gmc_recovered-linux-x64
            artifact_path: build/gmc_recovered
          - os: macos-14
            artifact_name: gmc_recovered-macos-arm64
            artifact_path: build/gmc_recovered
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --- Linux: build BOINC (autotools) then gmc_recovered with GMC_USE_BOINC=ON ---
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential autoconf automake libtool pkg-config libssl-dev libzip-dev

      - name: Build BOINC (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cd third_party/boinc
          autoreconf -i
          ./configure --disable-server --disable-client --disable-manager --enable-libraries
          make -j$(nproc)
          [ ! lib/.libs/libboinc.a -ef lib/libboinc.a ] && cp lib/.libs/libboinc.a lib/libboinc.a || true
          [ ! api/.libs/libboinc_api.a -ef lib/libboincapi.a ] && cp api/.libs/libboinc_api.a lib/libboincapi.a || true
          cd ../..

      - name: Build gmc_recovered (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cmake -B build -S . -DGMC_USE_BOINC=ON
          cmake --build build -j$(nproc)

      # --- macOS: build BOINC (autotools) then gmc_recovered with GMC_USE_BOINC=ON ---
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-14'
        run: |
          brew install autoconf automake libtool pkg-config openssl libzip cmake

      - name: Build BOINC (macOS)
        if: matrix.os == 'macos-14'
        env:
          PKG_CONFIG_PATH: "$(brew --prefix openssl)/lib/pkgconfig:$(brew --prefix libzip)/lib/pkgconfig"
        run: |
          cd third_party/boinc
          autoreconf -i
          ./configure --disable-server --disable-client --disable-manager --enable-libraries
          make -j$(sysctl -n hw.ncpu)
          [ ! lib/.libs/libboinc.a -ef lib/libboinc.a ] && cp lib/.libs/libboinc.a lib/libboinc.a || true
          [ ! api/.libs/libboinc_api.a -ef lib/libboincapi.a ] && cp api/.libs/libboinc_api.a lib/libboincapi.a || true
          cd ../..

      - name: Build gmc_recovered (macOS)
        if: matrix.os == 'macos-14'
        run: |
          cmake -B build -S . -DGMC_USE_BOINC=ON
          cmake --build build -j$(sysctl -n hw.ncpu)

      # --- Windows: build BOINC (MinGW Makefile.mingw) then gmc_recovered with MinGW ---
      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-cmake

      - name: Build BOINC (Windows MinGW)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cp third_party/boinc/win_build/win-config.h third_party/boinc/win_build/config.h
          cd third_party/boinc/lib
          mingw32-make -f Makefile.mingw BOINC_SRC=..
          cp libboinc_api.a libboincapi.a
          cd ../../..

      - name: Build gmc_recovered (Windows MinGW)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
            -DGMC_USE_BOINC=ON \
            -DBOINC_LIB=$PWD/third_party/boinc/lib/libboinc.a \
            -DBOINC_API_LIB=$PWD/third_party/boinc/lib/libboincapi.a
          cmake --build build -j4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          cp gmc_recovered-windows-x64.exe/gmc_recovered.exe ./gmc_recovered-windows-x64.exe
          cp gmc_recovered-linux-x64/gmc_recovered ./gmc_recovered-linux-x64
          cp gmc_recovered-macos-arm64/gmc_recovered ./gmc_recovered-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            BOINC-linked binaries for use with the BOINC client and Radioactive@home.
            - **Windows (x64):** `gmc_recovered-windows-x64.exe`
            - **Linux (x64):** `gmc_recovered-linux-x64`
            - **macOS (arm64):** `gmc_recovered-macos-arm64`
          files: |
            gmc_recovered-windows-x64.exe
            gmc_recovered-linux-x64
            gmc_recovered-macos-arm64
          generate_release_notes: true
